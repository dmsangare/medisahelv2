worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Gzip settings for fast local loading
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Anti Brute-force Web Rate Limiting Zone at proxy edge
    limit_req_zone $binary_remote_addr zone=clinical_api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=2r/s;

    server {
        listen 80;
        server_name localhost;

        # Standard client size limit for high-res radiology DICOM files/scanned PDFs
        client_max_body_size 50M;

        # OWASP/GDPR Clinically compliant security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https://ais-dev-t3zxgnu65xt4abfjth2phf-327822568584.europe-west2.run.app https://ais-pre-t3zxgnu65xt4abfjth2phf-327822568584.europe-west2.run.app https://generativelanguage.googleapis.com;" always;

        # Rate Limit for Authentication Login
        location /api/auth/login {
            limit_req zone=login_limit burst=5 nodelay;
            proxy_pass http://medishahel-app:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Rate Limit for General APIs
        location /api/ {
            limit_req zone=clinical_api_limit burst=20 nodelay;
            proxy_pass http://medishahel-app:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Reverse Proxy to the full-stack container on active port 3000 for client assets
        location / {
            proxy_pass http://medishahel-app:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Custom healthcare error routes handling
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
